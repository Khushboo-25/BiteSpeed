<!DOCTYPE html>
<html>

<head>
<title>BiteSpeed Identity Tester</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
background:white;
padding:25px;
max-width:500px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

pre{
background:#eee;
padding:15px;
border-radius:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>BiteSpeed Identity API</h2>

<label>Email</label>
<input id="email" placeholder="Enter email">

<label>Phone Number</label>
<input id="phone" placeholder="Enter phone number">

<button onclick="identify()">Identify</button>

<h3>Response</h3>

<pre id="result"></pre>

</div>

<script>

async function identify(){

const email=document.getElementById("email").value;
const phone=document.getElementById("phone").value;

const response=await fetch("/identify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email: email || null,
phoneNumber: phone || null
})
});

const data=await response.json();

document.getElementById("result").textContent=
JSON.stringify(data,null,2);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
<title>BiteSpeed Identity Tester</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
background:white;
padding:25px;
max-width:500px;
margin:auto;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result-card{
margin-top:20px;
padding:20px;
background:#f8f9fa;
border-radius:8px;
border:1px solid #ddd;
}

.result-card h3{
margin-bottom:10px;
}

.result-card ul{
padding-left:20px;
}

.error{
margin-top:20px;
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>BiteSpeed Identity API</h2>

<label>Email</label>
<input id="email" placeholder="Enter email">

<label>Phone Number</label>
<input id="phone" placeholder="Enter phone number">

<button onclick="identify()">Identify</button>

<h3>Response</h3>

<div id="result"></div>

</div>

<script>

async function identify(){

const email=document.getElementById("email").value.trim();
const phone=document.getElementById("phone").value.trim();
const resultDiv=document.getElementById("result");

resultDiv.innerHTML="Loading...";

const payload={};

if(email) payload.email=email;
if(phone) payload.phoneNumber=phone;

try{

const response=await fetch("/identify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(payload)
});

const data=await response.json();

if(data.error){
resultDiv.innerHTML=`<div class="error">Error: ${data.error}</div>`;
return;
}

const contact=data.contact;

resultDiv.innerHTML=`
<div class="result-card">

<h3>Primary Contact ID: ${contact.primaryContactId}</h3>

<h4>Emails</h4>
<ul>
${contact.emails.map(e=>`<li>${e}</li>`).join("")}
</ul>

<h4>Phone Numbers</h4>
<ul>
${contact.phoneNumbers.map(p=>`<li>${p}</li>`).join("")}
</ul>

<h4>Secondary Contact IDs</h4>
<ul>
${contact.secondaryContactIds.map(id=>`<li>${id}</li>`).join("")}
</ul>

</div>
`;

}catch(err){

resultDiv.innerHTML=`<div class="error">Server error</div>`;

}

}

</script>

</body>
</html>
